<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="German listening practice with iteration-based spaced repetition" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deutsch Hören" />
    <link rel="apple-touch-icon" href="/deutsch-horen/icon-192.png" />
    <link rel="manifest" href="/deutsch-horen/manifest.json" />
    <title>Deutsch Hören</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0a0a0a; }
      button, input { font-family: inherit; }
      input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 99px; background: #1e1e1e; outline: none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #FFCC00; cursor: pointer; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/deutsch-horen/assets/index.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/deutsch-horen/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
